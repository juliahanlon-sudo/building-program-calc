<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salesforce Space Planning Calculator</title>
    <style>
      /* Salesforce Sans is not publicly available via CDN outside Salesforce network.
         No external font import — falls back to the system sans-serif stack so the
         file stays fully self-contained (needed for single-file HTML). */
      :root {
        --sf-font: 'Inter', 'Salesforce Sans', Arial, sans-serif;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: var(--sf-font);
        background: #F3F3F3;
        color: #181818;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      input, select, button, textarea { font-family: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
